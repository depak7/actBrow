spring.application.name=actbrow
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.datasource.url=jdbc:postgresql://localhost:5432/actbrow
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=actbrow
spring.datasource.password=actbrow
spring.h2.console.enabled=false
actbrow.agent.max-steps=6
actbrow.agent.tool-timeout=10s
actbrow.llm.default-provider=gemini
actbrow.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
actbrow.gemini.default-model=gemini-2.5-flash
actbrow.gemini.request-timeout=20s
actbrow.gemini.api-key=${GEMINI_API_KEY:}
actbrow.cors.allowed-origins=http://localhost:3000
