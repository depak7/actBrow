spring.application.name=actbrow

# GET this full URL every ping-interval-ms on a virtual thread (set ping-enabled=true to turn on).
actbrow.health.ping-url=
actbrow.health.ping-interval-ms=10000
actbrow.health.ping-enabled=false
spring.jpa.open-in-view=false
spring.datasource.url=jdbc:postgresql://localhost:5432/actbrow
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=actbrow
spring.datasource.password=actbrow
spring.h2.console.enabled=false

actbrow.agent.max-steps=6
actbrow.agent.tool-timeout=10s
actbrow.llm.default-provider=openrouter

# Ollama local model (OpenAI-compatible API)
actbrow.ollama.base-url=http://localhost:8888
actbrow.ollama.default-model=unsloth/Qwen3.5-4B-GGUF
actbrow.ollama.request-timeout=120s
actbrow.ollama.api-key=${OLLAMA_API_KEY:}
# Groq (Cloud)
actbrow.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
actbrow.gemini.default-model=gemini-2.5-flash
actbrow.gemini.request-timeout=20s
actbrow.gemini.api-key=${GEMINI_API_KEY:}
actbrow.groq.base-url=https://api.groq.com/openai/v1
actbrow.groq.default-model=qwen/qwen3-32b
actbrow.groq.request-timeout=20s
actbrow.groq.api-key=${GROQ_API_KEY:}
actbrow.cors.allowed-origins=http://localhost:3000,http://localhost:3001
spring.jpa.hibernate.ddl-auto=create-only

actbrow.google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}

actbrow.openrouter.base-url=https://openrouter.ai/api/v1
actbrow.openrouter.default-model=qwen/qwen3.6-plus
actbrow.openrouter.request-timeout=20s
actbrow.openrouter.api-key=${OPENROUTER_API_KEY:}
actbrow.openrouter.reasoning.enabled=true
