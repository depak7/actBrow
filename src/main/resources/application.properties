spring.application.name=actbrow
logging.level.com.actbrow=DEBUG

# GET this full URL every ping-interval-ms on a virtual thread (set ping-enabled=true to turn on).
actbrow.health.ping-url=
actbrow.health.ping-interval-ms=10000
actbrow.health.ping-enabled=false
spring.jpa.open-in-view=false
spring.datasource.url=jdbc:postgresql://localhost:5432/actbrow
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=actbrow
spring.datasource.password=actbrow
spring.h2.console.enabled=false

actbrow.agent.max-steps=15
actbrow.agent.tool-timeout=10s

actbrow.snapshot.mode=image

# Model provider: Gemini via Spring AI's OpenAI-compatible client.
# Gemini's OpenAI-compatible endpoint accepts the same chat-completions shape; the
# starter accepts any OpenAI-compatible base URL. To swap providers, change base-url
# + api-key (e.g. point at OpenAI proper, or any other OpenAI-compatible endpoint).
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.api-key=${GEMINI_API_KEY:AIzaSyDvX-kGsWCd_ea0uXuEjnIH1lq-sM80bbI}
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0

actbrow.cors.allowed-origins=http://localhost:3000,http://localhost:3001
actbrow.public.base-url=http://localhost:8080
spring.jpa.hibernate.ddl-auto=none

actbrow.google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:383087078324-id4gaek13s6c304ne9m18la7vb0sgoqn.apps.googleusercontent.com}
