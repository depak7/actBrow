spring.application.name=actbrow
logging.level.com.actbrow=DEBUG

# GET this full URL every ping-interval-ms on a virtual thread (set ping-enabled=true to turn on).
actbrow.health.ping-url=
actbrow.health.ping-interval-ms=10000
actbrow.health.ping-enabled=false
spring.jpa.open-in-view=false
spring.datasource.url=jdbc:postgresql://localhost:5432/actbrow
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=actbrow
spring.datasource.password=actbrow
spring.h2.console.enabled=false

actbrow.agent.max-steps=15
actbrow.agent.tool-timeout=10s

# Model provider: DeepSeek via Spring AI's OpenAI-compatible client.
# DeepSeek's chat completions endpoint is API-compatible with OpenAI; the starter
# accepts any OpenAI-compatible base URL. To swap providers, change base-url + api-key
# (e.g. point at OpenAI proper, or any other OpenAI-compatible endpoint).
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.api-key=${DEEPSEEK_API_KEY:}
spring.ai.openai.chat.options.model=deepseek-chat
spring.ai.openai.chat.options.temperature=0

actbrow.cors.allowed-origins=http://localhost:3000,http://localhost:3001
spring.jpa.hibernate.ddl-auto=update

actbrow.google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
