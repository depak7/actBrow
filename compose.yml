services:
  postgres:
    image: postgres:16
    container_name: actbrow-postgres
    environment:
      POSTGRES_DB: actbrow
      POSTGRES_USER: actbrow
      POSTGRES_PASSWORD: actbrow
    ports:
      - "5432:5432"
    volumes:
      - actbrow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actbrow -d actbrow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  actbrow_postgres_data:
